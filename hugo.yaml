baseURL: "https://nacno-toporiame.github.io/"
languageCode: "en-dk"
title: "NaCNO's magic scroll"
copyright: "NaCNO"
theme: 'stack'

params:
  description: "a witch apprentice's spellbook"
  mainSections:
    - notes
  article:
    toc: true
    readingTime: false
  sidebar:
    subtitle: "a witch apprentice's spellbook"
    avatar:
      src: img/avatar.jpeg
  widgets:
    page:
      - type: toc
  cookies:
    enabled: false

privacy:
  googleAnalytics:
    disable: true
    respectDoNotTrack: true

menu:
  main: []
  social:
    - identifier: github
      name: GitHub
      url: https://github.com/nacno-toporiame/nacno-toporiame.github.io
      params:
        icon: brand-github

caches:
  images:
    dir: :cacheDir/images
